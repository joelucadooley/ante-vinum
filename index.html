<script>
/* ===================== TEACHING CONTENT ===================== */
/* Structure meters use: acid/tannin/body/alcohol on a three point scale (1-3) */

const COLOUR_MEANING={
 "Lemon":["The default colour of most dry white wine.","Youthful and either unoaked or only lightly oaked: Sauvignon Blanc, Pinot Grigio, Chablis, dry Riesling. If a white is paler than lemon it is usually very young and very cool climate."],
 "Gold":["Richness, oak, sweetness or age.","Something has deepened the colour: barrel ageing, a few years in bottle, very ripe fruit, or residual sugar. Think oaked Chardonnay, aged Riesling, Sauternes."],
 "Amber":["Considerable age, or deliberate oxidation.","Either a white with long bottle age, or a wine aged on purpose in contact with oxygen. Oloroso Sherry and Tawny Port sit here. In a young dry white it would be a fault."],
 "Pink":["A very brief maceration on black grape skins.","Only a few hours of skin contact. Signals a fresh, delicate, usually dry style made to be drunk young, as in much of Provence."],
 "Salmon":["Slightly longer skin contact, or a little age.","The classic colour of dry Provencal rose and many Rhone roses. A hint of orange at the rim can mean the wine has a year or two on it."],
 "Orange":["Deep for a rose: extended maceration or ripe, warm climate fruit.","Also seen in roses with some age. Expect more body and more obvious red fruit than a pale pink example."],
 "Purple":["Youth. Almost always a wine in its first year or two.","The blue and purple tones come from fresh pigment and fade quickly. A purple rim on a red suggests it has been recently bottled."],
 "Ruby":["A young to moderately aged red in good condition.","The most common colour for reds on the course: Merlot, Cabernet Sauvignon, Syrah, Sangiovese and many others in their drinking window."],
 "Garnet":["Several years of bottle age, with browning starting at the rim.","Pigment has begun to drop out. Mature Bordeaux, Rioja Reserva and older Burgundy show this. Nebbiolo can look garnet even when young."],
 "Tawny":["Extended oxidative ageing, or considerable age.","The brown has spread through the whole wine, not just the rim. Tawny Port is the obvious example, along with very old reds."]
};

/* profile: [acidity, tannin, body, alcohol] each 1..3 (low/medium/high, light/medium/full) */
const NOTES={

sat:{lead:`Tasting is examined as a discipline, not an opinion. The Systematic Approach gives you a fixed order and a fixed vocabulary so that two people can taste the same wine and describe it the same way. Learn the running order and the words that go in each slot, and most tasting questions answer themselves.`,
 sections:[
  {h:"Why a system at all",b:[`Left to ourselves we describe wine in whatever order strikes us, and we reach for words that mean different things to different people. The SAT fixes both problems. It also protects you in the exam: if you know that acidity is described only as low, medium or high, you cannot be talked into a wrong answer.`]},
  {h:"Appearance",b:[`Judge intensity first (pale, medium, deep), then colour. Whites run lemon, gold, amber. Roses run pink, salmon, orange. Reds run purple, ruby, garnet, tawny.`,`Colour is evidence, not decoration. Whites gain colour with age and oak; reds lose it. A deep purple red is young. A pale garnet red with a browning rim has years on it.`]},
  {h:"Nose: the three families",b:[`Primary aromas come from the grape and from fermentation: fruit, flowers, herbaceous notes. Blackcurrant in Cabernet, gooseberry in Sauvignon Blanc, pepper in Syrah.`,`Secondary aromas come from winemaking choices after fermentation: vanilla, toast and smoke from oak; butter from malolactic conversion; bread and biscuit from time on the lees.`,`Tertiary aromas come from age: dried fruit, nuts, honey, mushroom, leather, and the famous petrol note in mature Riesling.`,`If you can place an aroma in the right family you can usually work backwards to how the wine was made.`]},
  {h:"Palate: what you are actually feeling",b:[`Sweetness is tasted on the tongue. Acidity is the mouth watering sensation along the sides of the tongue. Tannin is a drying grip on the gums, from grape skins. Alcohol is warmth at the back of the throat. Body is the overall weight and texture.`,`Two of these are constantly confused. High acid can feel lean and is often mistaken for low body. High alcohol adds body and can read as sweetness even in a dry wine.`]},
  {h:"Judging quality: BLIC",b:[`Balance: no single component sticks out. Length: how long the pleasant flavours last after you swallow or spit. Intensity: how much flavour there is. Complexity: how many different things are going on.`,`A wine strong in all four is outstanding. A wine that is clean and correct but simple and short is acceptable rather than good. Price is not a criterion.`]}
 ]},

vineyard:{lead:`Roughly a tenth of the exam sits here, but this section quietly explains half the rest. Almost every question about why a wine tastes the way it does comes back to climate and to what the grower did.`,
 sections:[
  {h:"What the vine needs",b:[`Warmth, sunlight, water, nutrients and carbon dioxide. The growing season runs budburst, flowering, fruit set, veraison (when the grapes change colour and ripening begins), then ripening to harvest.`,`As a grape ripens, sugar rises and acid falls. Colour and tannin develop, and flavours move from green and herbaceous toward ripe fruit. Every stylistic difference below flows from where a grower stops that process.`]},
  {h:"Climate is the master variable",b:[`In a cool climate grapes struggle to ripen fully. You get higher acidity, lower alcohol, lighter body, and green or citrus fruit in whites with fresh red fruit in reds.`,`In a warm climate grapes ripen easily. You get lower acidity, higher alcohol, fuller body, and riper stone, tropical or black fruit.`,`This one contrast answers an enormous number of exam questions. Chablis and a Californian Chardonnay are the same grape; the climate is doing the talking.`]},
  {h:"Why site matters",b:[`Large bodies of water heat and cool slowly, moderating temperature and reducing frost risk. Altitude cools a site, which is how warm regions such as Mendoza keep freshness. Slopes drain well and, facing the sun, catch more light: the steep slate slopes of the Mosel are the classic case.`]},
  {h:"What can go wrong",b:[`Spring frost kills the new buds and shoots and can cost much of the crop. Hail damages fruit and vine. Drought stops ripening. Rain near harvest dilutes flavour and encourages rot.`]},
  {h:"Where the name on the label comes from",b:[`A PDO wine comes from a tightly defined area under strict rules: AOC in France, DOC and DOCG in Italy, DO and DOCa in Spain. A PGI wine comes from a larger area with looser rules, and is often labelled by grape variety: IGP or Vin de Pays, IGT, Vino de la Tierra.`,`This is why Sancerre does not print Sauvignon Blanc on the label. In Europe the place implies the grape.`]}
 ]},

winery:{lead:`Winemaking questions are rarely about machinery. They are about choices, and each choice leaves a fingerprint you can taste.`,
 sections:[
  {h:"Fermentation",b:[`Yeast converts grape sugar into alcohol and carbon dioxide, giving off heat and creating flavour along the way. Ferment cool and you keep delicate fruity aromas, which is why most whites are made that way. Ferment warm and you extract colour and tannin from skins, which is why reds need it.`]},
  {h:"White, red and rose",b:[`For white wine the grapes are pressed first and the juice ferments on its own. For red wine the juice ferments in contact with the skins, which is where all the colour and tannin come from, and the wine is pressed afterwards.`,`Rose is made by leaving the juice on black skins for only a few hours to a couple of days, then draining it off and finishing it like a white. Blending red and white together is not permitted for still wine in most of Europe. Rose Champagne is the well known exception.`]},
  {h:"Making a wine sweet",b:[`Either stop the fermentation before the yeast has eaten all the sugar, or add sweetness back afterwards. Grapes can also be concentrated before fermentation by noble rot, by drying, by freezing on the vine, or simply by picking very late.`]},
  {h:"Vessels and oak",b:[`Stainless steel and concrete are neutral and preserve fruit. Oak allows a little oxygen in, which softens tannins. New, small, heavily toasted barrels give the most flavour: vanilla, toast, smoke and spice. Large old vessels give almost none.`,`If a wine tastes of vanilla and toast, that is the barrel, not the grape.`]},
  {h:"Two finishing touches",b:[`Malolactic conversion turns sharp malic acid into softer lactic acid and can add a buttery note. It is standard for reds and a deliberate choice for whites such as Chardonnay.`,`Lees contact means leaving the wine on its dead yeast cells, which adds body and a bready, biscuity character. It is central to Champagne, Muscadet and many Chardonnays.`]},
  {h:"What bottle age does",b:[`Reds lose colour and soften: purple to ruby to garnet to tawny, with tannins mellowing and fresh fruit giving way to dried fruit, leather and mushroom. Whites gain colour: lemon to gold to amber, with fruit turning to honey, nuts and, in Riesling, petrol.`,`Most wine is made to be drunk young. Only wines with real concentration plus acidity or tannin improve over many years.`]}
 ]},

 sections:[
  {h:"Reading a Burgundy label",b:[`White Burgundy is Chardonnay. The quality ladder runs regional (Bourgogne), then village, then Premier Cru, then Grand Cru for the finest individual vineyards. Chablis is the cool northern outpost and is usually unoaked; the Cote d Or is richer and normally barrel fermented.`]},
  {h:"German sweetness terms",b:[`The Pradikat levels rank the ripeness of the grapes at harvest, ascending: Kabinett, Spatlese, Auslese, Beerenauslese, Eiswein, Trockenbeerenauslese. They indicate ripeness rather than guaranteeing sweetness, which is why labels also carry trocken (dry) and halbtrocken (off dry).`]}
 ]},

  {n:"Syrah / Shiraz",d:"The same grape in two accents.",p:[2,3,3,3],
   f:"As Northern Rhone Syrah: blackberry, black pepper, violets, sometimes smoked meat. As Australian Shiraz: riper blackberry and plum, sweet spice, soft tannins, higher alcohol.",
   r:"Cote-Rotie, Hermitage, Crozes-Hermitage; Barossa Valley, Hunter Valley, McLaren Vale.",
   k:"Peppery and medium bodied points to the Northern Rhone. Opulent, sweet spiced and high in alcohol points to Australia."}
 ],
 sections:[
  {h:"Bordeaux in one paragraph",b:[`The river splits the region. On the Left Bank, gravel soils suit Cabernet Sauvignon, so the blends are Cabernet led, firm and long lived. On the Right Bank, clay suits Merlot, so the blends are Merlot led, softer and approachable sooner. Everything else about Bordeaux hangs off that distinction.`]}
 ]},

rred:{lead:`These varieties carry roughly a quarter of the exam between them, alongside the regional whites. Group them by country and the list becomes far less daunting.`,
 profiles:[
  {n:"Tempranillo",d:"Spain's leading black grape.",p:[2,2,3,3],
   f:"Red plum and cherry, with vanilla and coconut from American oak; leather and dried fruit with age.",
   r:"Rioja, Ribera del Duero, Navarra.",
   k:"Rioja labels tell you the ageing: Joven, then Crianza, Reserva and Gran Reserva in ascending order of time in oak and bottle."},
  {n:"Nebbiolo",d:"Pale in the glass, fierce in the mouth.",p:[3,3,3,3],
   f:"Red cherry, dried herbs, roses and tar; truffle and leather with age.",
   r:"Barolo and Barbaresco in Piedmont.",
   k:"The classic trap: it looks light and pale garnet even when young, but it has high acid and high tannin and needs years."},
  {n:"Sangiovese",d:"Tuscany's backbone.",p:[3,3,2,2],
   f:"Sour red cherry, dried herbs, tomato leaf; savoury and earthy with age.",
   r:"Chianti and Chianti Classico, Brunello di Montalcino.",
   k:"Classico means the original heartland of the zone. Riserva means extra ageing."},
  {n:"Grenache / Garnacha",d:"Ripe, sweet fruited and high in alcohol.",p:[2,2,3,3],
   f:"Strawberry and red plum, warm spice, sometimes a herbal note.",
   r:"Southern Rhone: Cotes du Rhone and Chateauneuf-du-Pape; Priorat, Rioja, Navarra; Barossa and McLaren Vale.",
   k:"Usually blended, classically with Syrah and Mourvedre."},
  {n:"Gamay",d:"Light, juicy and low in tannin.",p:[3,1,1,1],
   f:"Fresh red cherry and raspberry, sometimes banana and kirsch from carbonic style winemaking.",
   r:"Beaujolais, rising through Beaujolais Villages to the ten Crus such as Fleurie.",
   k:"One of the few reds that suits a light chill."},
  {n:"Malbec",d:"Argentina's adopted signature.",p:[2,2,3,3],
   f:"Deep colour, ripe black plum, blackberry and violet, often with vanilla from oak.",
   r:"Mendoza, frequently at high altitude.",
   k:"Altitude is what keeps freshness in such a warm, sunny region."}
 ],
 sections:[
  {h:"Italy: the ones that catch people out",b:[`Barbera has high acid but low tannin, the mirror image of Nebbiolo from the same region. Corvina makes light Valpolicella, and also Amarone, a dry, full bodied, high alcohol wine made from dried grapes. Montepulciano is a grape grown in Abruzzo, not the Tuscan town of Montepulciano.`]},
  {h:"The New World specialities",b:[`Carmenere found a home in Chile, showing black fruit with a herbal, bell pepper edge. Pinotage is South Africa's own crossing of Pinot Noir and Cinsault; a Cape Blend is a blend featuring it. Zinfandel makes full bodied, high alcohol reds in California and is the same grape as Primitivo in Puglia. White Zinfandel is an off dry pink wine made from it.`]}
 ]},

rwhite:{lead:`A smaller group, but each one has a signature that makes it easy to recognise once you have met it.`,
 profiles:[
  {n:"Chenin Blanc",d:"High acid and endlessly versatile.",p:[3,0,2,2],
   f:"Green apple, lemon and wet wool when dry; honey and marzipan when sweet or aged.",
   r:"Vouvray and the wider Loire; South Africa, where it is the most planted variety.",
   k:"Made dry, off dry, sweet and sparkling, so the label matters more than usual."},
  {n:"Semillon",d:"Two utterly different classics.",p:[2,0,2,2],
   f:"Lemon and grass when young; honey, toast and nuts with age.",
   r:"Sauternes, blended with Sauvignon Blanc; Hunter Valley; Barossa.",
   k:"Its thin skin makes it prone to noble rot, which is exactly what Sauternes wants."},
  {n:"Viognier",d:"Full bodied and heady, with low acidity.",p:[1,0,3,3],
   f:"Apricot, peach and blossom.",
   r:"Condrieu in the Northern Rhone.",
   k:"The low acid, high perfume combination is unusual enough to be a giveaway."},
  {n:"Gewurztraminer",d:"The most obviously aromatic white on the course.",p:[1,0,3,3],
   f:"Lychee, rose, ginger and sweet spice.",
   r:"Alsace.",
   k:"Deep lemon to gold colour, full body, low acid, often a touch off dry."},
  {n:"Albarino",d:"Coastal, saline and refreshing.",p:[3,0,2,2],
   f:"Peach, citrus and occasionally a salty note.",
   r:"Rias Baixas in green, rainy north west Spain.",
   k:"Made for seafood, which is exactly what surrounds it."}
 ],
 sections:[
  {h:"The Italian whites, quickly",b:[`Verdicchio dei Castelli di Jesi: high acid, citrus, a bitter almond finish. Gavi, from the Cortese grape: light and crisp. Soave, from Garganega: medium bodied, pear and almond. Fiano di Avellino: richer and more textured, with stone fruit and honey.`]},
  {h:"Hungary's sweet classic",b:[`Furmint has searing acidity and is the basis of Tokaji Aszu, where botrytis affected berries, called aszu, are added to a base wine. The acidity is what stops the sweetness cloying.`]}
 ]},

sparkling:{lead:`Almost every sparkling question comes down to one thing: which method made the bubbles, and therefore what the wine should taste like.`,
 sections:[
  {h:"Traditional method",b:[`A dry base wine is bottled with sugar and yeast, and a second fermentation happens inside that bottle. The carbon dioxide dissolves into the wine, giving a fine, persistent mousse.`,`The wine then rests on the dead yeast cells for months or years. That contact, called autolysis, creates the bread, biscuit and brioche character that defines the style. Champagne, Cava and Cremant all work this way, as does South African Methode Cap Classique.`]},
  {h:"Tank method",b:[`The second fermentation happens in a large sealed tank, and the wine is filtered and bottled under pressure. It is faster and cheaper, and it keeps the fresh, grapey, floral aromas of the base grape.`,`Prosecco, from Glera in the Veneto, is the obvious example: apple, pear and blossom, with little or no yeasty character. Asti, from Moscato in Piedmont, is sweet, grapey and only around seven per cent alcohol.`]},
  {h:"Champagne in detail",b:[`Three grapes: Chardonnay, Pinot Noir and Meunier. Blanc de Blancs is made from white grapes only, meaning Chardonnay. Blanc de Noirs is a white wine made from black grapes.`,`Non-vintage blends several years for a consistent house style. Vintage comes from a single declared year and spends longer on the lees, so it is richer and more complex.`]},
  {h:"Sweetness on the label",b:[`From driest to sweetest: Brut Nature, Extra Brut, Brut, Extra Dry, Sec, Demi-Sec, Doux. Brut is the standard dry style, and Extra Dry is confusingly sweeter than Brut.`]}
 ]},

fortified:{lead:`Fortified wine is wine with grape spirit added. The single most useful fact is when the spirit goes in, because that decides whether the wine ends up dry or sweet.`,
 sections:[
  {h:"The timing rule",b:[`Add the spirit after fermentation has finished and the yeast has already eaten all the sugar, so the wine is dry. That is Sherry.`,`Add the spirit part way through fermentation and the alcohol kills the yeast while sugar remains, so the wine is sweet. That is Port.`]},
  {h:"Sherry",b:[`From Jerez in southern Spain, mostly from Palomino. Fino is aged under flor, a living layer of yeast that seals the wine from oxygen, keeping it pale, bone dry and tangy with a bready, almond character.`,`Oloroso is deliberately aged in contact with oxygen, with no flor, giving an amber wine that is dry but rich, with walnut, caramel and dried fruit. Amontillado starts under flor and finishes oxidatively, so it sits between the two.`,`Pedro Ximenez, from sun dried grapes, is almost black and intensely sweet, with raisin and coffee. Sherry is blended through a solera, where younger wine progressively refreshes older barrels to keep the house style consistent.`]},
  {h:"Port",b:[`From the Douro Valley in Portugal. Ruby styles are aged briefly in large vessels to protect fresh black fruit, rising through Reserve to Late Bottled Vintage, which comes from a single year and is ready on release.`,`Tawny is aged for years in small barrels with oxygen contact, so the colour fades to tawny and the flavours turn to caramel, walnut and dried fruit. Ten and twenty year Tawnies state an average age.`,`Vintage Port comes from a single outstanding declared year, is bottled young and matures in bottle for decades. It is powerful and tannic, throws a heavy sediment, and needs decanting.`]}
 ]},

service:{lead:`A small section, but easy marks, and the food pairing rules are genuinely useful the moment you leave the exam room.`,
 sections:[
  {h:"Storage and service",b:[`Store bottles somewhere cool and, above all, at a constant temperature, away from light, lying down if they are sealed with a cork so the cork stays moist.`,`Serving temperatures: sparkling and sweet wines well chilled at six to eight degrees; light and medium whites and roses chilled at seven to ten; full bodied whites lightly chilled at ten to thirteen; light reds at around thirteen; medium and full reds at fifteen to eighteen.`,`Too cold mutes aroma and exaggerates tannin and acid. Too warm makes alcohol dominate.`]},
  {h:"Faults",b:[`Cork taint smells of damp cardboard and mutes the fruit. Oxidation, usually from a failed closure, tastes stale and looks browner than it should. Heat damage tastes dull and stewed.`]},
  {h:"The food rules that matter",b:[`Sweetness in food makes wine taste drier, more acidic and less fruity, so the wine should be at least as sweet as the dish. Umami does much the same and makes tannin harsher.`,`Salt and acidity in food are the wine drinker's friends: salt softens tannin and acid, making wine taste smoother and fruitier, and acid in the dish makes the wine taste less sharp and more fruity.`,`Chilli heat exaggerates alcohol burn and bitterness, so reach for lower alcohol wines with a touch of sweetness. High tannin reds want protein and salt, which is why steak and Cabernet Sauvignon works.`]}
 ]}
};

}

 const d=DECKS.find(x=>x.id===state.deckId);
 const card=d.cards[state.cardIdx];
 const atStart=state.cardIdx===0, atEnd=state.cardIdx===d.cards.length-1;
 app.innerHTML=`
  ${barHTML(esc(d.title),(state.cardIdx+1)+" / "+d.cards.length,"decks")}
  <div class="flip-wrap">
   <div class="flip${state.flipped?" flipped":""}" id="flip" role="button" tabindex="0" aria-label="${state.flipped?"Show question":"Show answer"}">
     <div class="face"><span class="caps gold">Question</span><span class="card-rule"></span><p class="q">${esc(card[0])}</p><span class="hint">Tap to reveal</span></div>
     <div class="face back"><span class="caps gold">Answer</span><span class="card-rule"></span><p class="a">${esc(card[1])}</p><span class="hint">Tap to return</span></div>
   </div>
  </div>
  <div style="display:flex;gap:10px;justify-content:center;margin-top:26px">
    <button class="btn ghost" data-act="prev" ${atStart?"disabled":""}>Previous</button>
    <button class="btn" data-act="next" ${atEnd?"disabled":""}>Next</button>
  </div>
  ${atEnd?`<p style="text-align:center;color:var(--ink-soft);font-size:17px;margin-top:18px">End of deck. <button class="linklike" data-act="decks">Choose another</button></p>`:""}`;
}

/* ---------------------- QUIZ / EXAM ---------------------- */
let recentQ=[];   // recently shown quiz questions, to avoid quick repeats
let recentB=[];   // recently shown blind tasting notes
function sampleByLO(lo,n){return shuffle(BANK.filter(q=>q.lo===lo)).slice(0,n);}
function startQuiz(mode){
 let qs;
 if(mode==="exam"){
   qs=shuffle([...sampleByLO(1,5),...sampleByLO(2,4),...sampleByLO(3,19),...sampleByLO(4,12),...sampleByLO(5,6),...sampleByLO(6,4)]);
 }else if(mode==="blind"){
   const all=BLIND.map((q,i)=>i);
   const fresh=shuffle(all.filter(i=>!recentB.includes(i)));
   let pick=fresh.slice(0,10);
   if(pick.length<10){pick=pick.concat(shuffle(all.filter(i=>recentB.includes(i))).slice(0,10-pick.length));}
   recentB=[...recentB,...pick].slice(-18);
   qs=shuffle(pick).map(i=>BLIND[i]);
 }else{
   const all=BANK.map((q,i)=>i);
   const fresh=shuffle(all.filter(i=>!recentQ.includes(i)));
   let pick=fresh.slice(0,10);
   if(pick.length<10){pick=pick.concat(shuffle(all.filter(i=>recentQ.includes(i))).slice(0,10-pick.length));}
   recentQ=[...recentQ,...pick].slice(-90);
   qs=shuffle(pick).map(i=>BANK[i]);
 }
 state.quiz={mode,qs,i:0,picked:null,answers:[],secondsLeft:mode==="exam"?3600:null,done:false};
 if(mode==="exam"){
   clearInterval(state.timerId);
   state.timerId=setInterval(()=>{
     if(!state.quiz||state.quiz.done){clearInterval(state.timerId);return;}
     state.quiz.secondsLeft--;
     const el=document.getElementById("timer");
     if(el)el.textContent=fmtTime(state.quiz.secondsLeft);
     if(state.quiz.secondsLeft<=0){finishQuiz();}
   },1000);
 }
 state.view="quiz";render();
}
function fmtTime(s){const m=Math.floor(s/60),ss=s%60;return m+":"+String(ss).padStart(2,"0");}
function finishQuiz(){
 clearInterval(state.timerId);
 // record any unanswered as skipped
 state.quiz.done=true;state.view="results";render();
 window.scrollTo(0,0);
}
function renderQuiz(){
 const z=state.quiz,q=z.qs[z.i];
 const isExam=z.mode==="exam";
 const right=isExam?`<span id="timer" style="font-variant-numeric:tabular-nums">${fmtTime(z.secondsLeft)}</span>`:(z.i+1)+" / "+z.qs.length;
 const opts=q.o.map((opt,idx)=>{
   let cls="opt";let dis="";
   if(!isExam&&z.picked!==null){dis="disabled";if(idx===q.a)cls+=" correct";else if(idx===z.picked)cls+=" wrong";}
   if(isExam&&z.picked===idx)cls+=" chosen";
   return `<button class="${cls}" ${dis} data-opt="${idx}"><span class="lt">${String.fromCharCode(65+idx)}</span><span>${esc(opt)}</span></button>`;
 }).join("");
 const feedback=(!isExam&&z.picked!==null)?
  `<div style="margin-top:20px"><p class="explain">${esc(q.w)}</p>
   <div style="text-align:right;margin-top:20px"><button class="btn" data-act="qnext">${z.i+1>=z.qs.length?"Results":"Next"}</button></div></div>`
  :(isExam?`<div style="text-align:right;margin-top:20px">
     <button class="btn" data-act="qnext" ${z.picked===null?"disabled":""}>${z.i+1>=z.qs.length?"Finish":"Next"}</button></div>`:"");
 app.innerHTML=`
  <div class="bar">
    <button class="linkback" data-act="quitquiz">&larr; Quit</button>
    <span class="mid caps">${isExam?"Mock exam":(z.mode==="blind"?"Blind tasting":"Quick quiz")}</span>
    <span class="caps" style="min-width:64px;text-align:right">${right}</span>
  </div>
  ${isExam?`<p style="color:var(--ink-soft);font-size:16px;margin:0 0 14px">Question ${z.i+1} of ${z.qs.length}. Answers are shown at the end.</p>`:""}
  <div class="progress"><div style="width:${(z.i/z.qs.length)*100}%"></div></div>
  ${z.mode==="blind"
   ? `<div class="tnote">
        <p class="tn-lead">From the note below, which wine is in the glass?</p>
        <div class="tn-row"><span class="tn-k">Appearance</span><span class="tn-v">${esc(q.ap)}</span></div>
        <div class="tn-row"><span class="tn-k">Nose</span><span class="tn-v">${esc(q.no)}</span></div>
        <div class="tn-row"><span class="tn-k">Palate</span><span class="tn-v">${esc(q.pa)}</span></div>
      </div>`
   : `<p class="q-stem">${esc(q.q)}</p>`}
  ${opts}${feedback}`;
}
function renderResults(){
 const z=state.quiz;
 const answered=z.answers;
 const score=answered.filter(a=>a.pick===a.q.a).length;
 const total=z.qs.length;
 const pct=Math.round(score/total*100);
 let grade;
 if(pct>=85)grade="Pass with distinction";else if(pct>=70)grade="Pass with merit";
 else if(pct>=55)grade="Pass";else if(pct>=45)grade="Fail";else grade="Fail unclassified";
 const misses=answered.filter(a=>a.pick!==a.q.a);
 const unanswered=total-answered.length;
 const missHTML=misses.length?`<div style="margin-top:40px">
   <p class="caps gold" style="margin-bottom:4px">Worth revisiting</p>
   ${misses.map(m=>`<div class="miss"><p style="margin:0;font-size:19px;font-weight:400;line-height:1.35">${m.q.q?esc(m.q.q):esc(m.q.ap+". "+m.q.no+".")}</p>
    <p style="margin:6px 0 0;font-size:17px;color:var(--ink-soft);line-height:1.5"><em style="color:var(--good);font-style:normal">${esc(m.q.o[m.q.a])}.</em> ${esc(m.q.w)}</p></div>`).join("")}</div>`:"";
 app.innerHTML=`
  ${barHTML(z.mode==="exam"?"Mock exam":(z.mode==="blind"?"Blind tasting":"Quick quiz"),"")}
  <div style="text-align:center;padding:22px 0 6px">
    <p class="caps gold">Result</p>
    <p class="score">${pct}%</p>
    <p style="color:var(--ink-soft);margin:0;font-size:18px">${score} of ${total} correct${unanswered?`, ${unanswered} unanswered`:""}</p>
    <p style="margin:14px 0 0;font-size:19px;color:${pct>=55?"var(--good)":"var(--bad)"}">${grade}</p>
    <hr class="hair" style="margin:26px auto;max-width:180px">
    <p style="color:var(--ink-soft);margin:0;font-size:16px">${z.mode==="blind"?"Identify the wine from its appearance, nose and palate.":"Pass 55 &nbsp;&middot;&nbsp; Merit 70 &nbsp;&middot;&nbsp; Distinction 85"}</p>
    <div style="margin-top:26px;display:flex;gap:10px;justify-content:center">
      <button class="btn" data-act="${z.mode==="exam"?"exam":"quiz"}">Again</button>
      <button class="btn ghost" data-act="home">Contents</button>
    </div>
  </div>
  ${missHTML}`;
}

/* ---------------------- SAT REFERENCE ---------------------- */
const SAT_GROUPS=[
 ["Appearance",[
   ["Intensity","pale &middot; medium &middot; deep"],
   ["Colour, white","lemon &middot; gold &middot; amber"],
   ["Colour, ros&eacute;","pink &middot; salmon &middot; orange"],
   ["Colour, red","purple &middot; ruby &middot; garnet &middot; tawny"]]],
 ["Nose",[
   ["Intensity","light &middot; medium &middot; pronounced"],
   ["Characteristics","primary (grape) &middot; secondary (winemaking) &middot; tertiary (age)"]]],
 ["Palate",[
   ["Sweetness","dry &middot; off-dry &middot; medium &middot; sweet"],
   ["Acidity","low &middot; medium &middot; high"],
   ["Tannin","low &middot; medium &middot; high"],
   ["Alcohol","low &middot; medium &middot; high"],
   ["Body","light &middot; medium &middot; full"],
   ["Flavour intensity","light &middot; medium &middot; pronounced"],
   ["Finish","short &middot; medium &middot; long"]]],
 ["Conclusions",[
   ["Quality (BLIC)","poor &middot; acceptable &middot; good &middot; very good &middot; outstanding"]]]
];
function renderSat(){
 const sel=state.swatch;
 const groups=["White","Ros\u00e9","Red"].map(g=>{
   const chips=WINE_SCALE.filter(c=>c.g===g).map(c=>
     `<button class="sw${sel===c.n?" on":""}" data-sw="${c.n}"><i style="background:${c.h}"></i>
        <span class="sw-name">${c.n}</span></button>`).join("");
   return `<div class="sw-group"><p class="caps gold sw-head">${g} wines</p><div class="sw-row">${chips}</div></div>`;
 }).join("");
 const m=sel?COLOUR_MEANING[sel]:null;
 const detail=m?`<div class="sw-detail fadein"><p class="swd-h">${sel}<span>${m[0]}</span></p><p class="swd-b">${m[1]}</p></div>`
   :`<div class="sw-detail muted"><p class="swd-b">Choose a colour to see what it tells you about the wine.</p></div>`;
 const table=SAT_GROUPS.map(g=>`<section class="sat-block">
    <h3 class="sat-head">${g[0]}</h3>
    ${g[1].map(r=>`<div class="sat-r"><span class="sat-k">${r[0]}</span><span class="sat-v">${r[1]}</span></div>`).join("")}
  </section>`).join("");
 app.innerHTML=`
  ${barHTML("Tasting reference","")}
  <p style="color:var(--ink-soft);margin:0 0 30px;max-width:34em">
    Every wine on the course is described with this vocabulary, working from appearance through to a judgement of quality.</p>
  <div class="sec"><span class="caps gold">What the colour tells you</span><span class="line"></span></div>
  <div class="swatches">${groups}</div>
  ${detail}
  <div class="sec"><span class="caps gold">The full scale</span><span class="line"></span></div>
  <div class="sat-table">${table}</div>`;
}

/* ---------------------- RENDER + EVENTS ---------------------- */

const NAV=[["notes","Notes"],["flashcards","Cards"],["quiz","Quiz"],["blind","Blind"],["exam","Exam"],["satref","Tasting"]];
function renderNav(){
 const bar=document.getElementById("navlinks");
 if(state.view==="home"){bar.innerHTML="";return;}
 const cur={home:"",notes:"notes",note:"notes",decks:"flashcards",deck:"flashcards",
            quiz:(state.quiz&&state.quiz.mode==="exam")?"exam":((state.quiz&&state.quiz.mode==="blind")?"blind":"quiz"),
            results:(state.quiz&&state.quiz.mode==="exam")?"exam":((state.quiz&&state.quiz.mode==="blind")?"blind":"quiz"),satref:"satref"}[state.view]||"";
 bar.innerHTML=NAV.map(n=>
   `<button data-act="${n[0]}" class="${cur===n[0]?"on":""}">${n[1]}</button>`).join("");
}
function render(){
 renderNav();
 if(state.view==="home")renderHome();
 else if(state.view==="notes")renderNotesList();
 else if(state.view==="note")renderNote();
 else if(state.view==="decks")renderDecks();
 else if(state.view==="deck")renderDeck();
 else if(state.view==="quiz")renderQuiz();
 else if(state.view==="results")renderResults();
 else if(state.view==="satref")renderSat();
}
document.addEventListener("click",e=>{
 const t=e.target.closest("[data-act],[data-deck],[data-note],[data-opt],[data-sw],#flip");
 if(!t)return;
 if(t.id==="flip"){state.flipped=!state.flipped;renderDeck();return;}
 if(t.dataset.sw){state.swatch=state.swatch===t.dataset.sw?null:t.dataset.sw;renderSat();return;}
 if(t.dataset.note){state.noteId=t.dataset.note;state.view="note";render();window.scrollTo(0,0);return;}
 if(t.dataset.deck){state.deckId=t.dataset.deck;state.cardIdx=0;state.flipped=false;state.view="deck";render();window.scrollTo(0,0);return;}
 if(t.dataset.opt!==undefined){
   const z=state.quiz;if(!z)return;
   if(z.mode==="exam"){z.picked=+t.dataset.opt;renderQuiz();return;}
   if(z.picked!==null)return;
   z.picked=+t.dataset.opt;z.answers.push({q:z.qs[z.i],pick:z.picked});renderQuiz();return;
 }
 const act=t.dataset.act;
 if(act==="home"||act==="quitquiz"){clearInterval(state.timerId);state.quiz=null;state.view="home";render();window.scrollTo(0,0);}
 else if(act==="flashcards"||act==="decks"){state.view="decks";render();window.scrollTo(0,0);}
 else if(act==="notes"){state.view="notes";render();window.scrollTo(0,0);}
 else if(act==="quiz")startQuiz("quick");
 else if(act==="blind")startQuiz("blind");
 else if(act==="exam")startQuiz("exam");
 else if(act==="satref"){state.swatch=null;state.view="satref";render();window.scrollTo(0,0);}
 else if(act==="prev"||act==="next"){
   const d=DECKS.find(x=>x.id===state.deckId);
   const ni=state.cardIdx+(act==="next"?1:-1);
   if(ni<0||ni>=d.cards.length)return;
   state.cardIdx=ni;state.flipped=false;renderDeck();
 }
 else if(act==="qnext"){
   const z=state.quiz;
   if(z.mode==="exam"){
     if(z.picked===null)return;
     z.answers.push({q:z.qs[z.i],pick:z.picked});
   }
   if(z.i+1>=z.qs.length){finishQuiz();return;}
   z.i++;z.picked=null;renderQuiz();window.scrollTo(0,0);
 }
});
app.addEventListener("keydown",e=>{
 if(e.target.id==="flip"&&(e.key==="Enter"||e.key===" ")){e.preventDefault();state.flipped=!state.flipped;renderDeck();}
});

/* ---------------------- WINE MODE (red / white) ---------------------- */
const themebtn=document.getElementById("themebtn");
function glassSVG(){
 return `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
   <path d="M8.6 6.6 H15.4 C15 8.9 13.6 10.7 12 11.3 C10.4 10.7 9 8.9 8.6 6.6 Z" fill="var(--glass-fill)" stroke="none"/>
   <path d="M7.5 3.5 H16.5 C16.5 8 14.5 11 12 11.5 C9.5 11 7.5 8 7.5 3.5 Z"/>
   <path d="M12 11.5 V19.5"/><path d="M8.5 19.5 H15.5"/></svg>`;
}
function readWine(){
 try{const s=localStorage.getItem("av-wine");if(s)return s;}catch(e){}
 try{if(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)return "red";}catch(e){}
 return "white";
}
function applyWine(mode){
 document.documentElement.setAttribute("data-wine",mode);
 const next=mode==="red"?"white":"red";
 themebtn.innerHTML=glassSVG();
 themebtn.setAttribute("aria-label","Switch to "+next+" wine mode");
 themebtn.setAttribute("title",(mode==="red"?"Red":"White")+" wine — switch to "+next);
 try{localStorage.setItem("av-wine",mode);}catch(e){}
 document.querySelectorAll('meta[name="theme-color"]').forEach(m=>m.remove());
 const tc=document.createElement("meta"); tc.name="theme-color";
 tc.content = mode==="red" ? "#160709" : "#F4F3E4";
 document.head.appendChild(tc);
}
themebtn.addEventListener("click",()=>{
 const now=document.documentElement.getAttribute("data-wine")==="red"?"white":"red";
 applyWine(now);
});
applyWine(readWine());

render();
</script>
